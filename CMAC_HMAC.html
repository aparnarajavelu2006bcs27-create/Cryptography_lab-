<script>
/* ============================================================
   GLOBAL STEP PRINTER
   ============================================================ */
let stepOutput = [];

}

function printSection(title) {

}

function printSubsection(title) {

}

}

/* ============================================================
   SHA-256 IMPLEMENTATION WITH ALL STEPS
   ============================================================ */

const SHA256_INIT = [
    0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a,
    0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19
];

const SHA256_K = [
    0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
    0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
    0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
    0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
    0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
    0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
    0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
    0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
];

function rotr(n, x) { return ((x >>> n) | (x << (32 - n))) >>> 0; }
function shr(n, x) { return x >>> n; }
function ch(x, y, z) { return (x & y) ^ (~x & z); }
function maj(x, y, z) { return (x & y) ^ (x & z) ^ (y & z); }
function sigma0(x) { return rotr(2, x) ^ rotr(13, x) ^ rotr(22, x); }
function sigma1(x) { return rotr(6, x) ^ rotr(11, x) ^ rotr(25, x); }
function gamma0(x) { return rotr(7, x) ^ rotr(18, x) ^ shr(3, x); }
function gamma1(x) { return rotr(17, x) ^ rotr(19, x) ^ shr(10, x); }

function stringToBytes(str) {
    const bytes = [];
    for (let i = 0; i < str.length; i++) {
        bytes.push(str.charCodeAt(i) & 0xFF);
    }
    return bytes;
}

function bytesToHex(bytes) {
    return bytes.map(b => b.toString(16).padStart(2, '0')).join('');
}

function sha256WithSteps(message) {
    printSection('SHA-256 HASH CALCULATION');
    printValue('Input Message', message);
    printValue('Message Length (bits)', message.length * 8);
    
    // Step 1: Convert to bytes
    printSubsection('Step 1: Convert message to bytes');
    const msgBytes = stringToBytes(message);
    printValue('Message bytes (decimal)', msgBytes.join(', '));
    printValue('Message bytes (hex)', bytesToHex(msgBytes));
    
    // Step 2: Padding
    printSubsection('Step 2: Padding');
    msgBytes.push(0x80);
    printValue('After adding 1 bit (0x80)', bytesToHex(msgBytes));
    
    const msgLen = msgBytes.length;
    const padLen = (msgLen % 64 < 56) ? (56 - msgLen % 64) : (120 - msgLen % 64);
    printValue('Padding needed (bytes)', padLen);
    
    for (let i = 0; i < padLen; i++) msgBytes.push(0x00);
    printValue('After zero padding', bytesToHex(msgBytes));
    
    const bitLen = message.length * 8;
    msgBytes.push((bitLen >>> 24) & 0xFF);
    msgBytes.push((bitLen >>> 16) & 0xFF);
    msgBytes.push((bitLen >>> 8) & 0xFF);
    msgBytes.push(bitLen & 0xFF);
    printValue('After length append', bytesToHex(msgBytes));
    printValue('Total padded length', msgBytes.length + ' bytes (' + (msgBytes.length * 8) + ' bits)');
    
    // Step 3: Initialize Hash Values
    printSubsection('Step 3: Initialize Hash Values (H)');
    let h = [...SHA256_INIT];
    for (let i = 0; i < 8; i++) {
        printValue(`H[${i}]`, '0x' + h[i].toString(16).padStart(8, '0'));
    }
    
    // Step 4: Process each 512-bit chunk
    printSubsection('Step 4: Process Message in 512-bit Chunks');
    
    for (let chunk = 0; chunk < msgBytes.length / 64; chunk++) {
        print('\n>>> Processing Chunk #' + (chunk + 1) + ' <<<', 'step');
        
        // Create message schedule
        const w = new Array(64);
        
        printSubsection('4.' + (chunk + 1) + '.1: Message Schedule (W)');
        
        // First 16 words from chunk
        for (let i = 0; i < 16; i++) {
            w[i] = (msgBytes[chunk * 64 + i * 4] << 24) |
                   (msgBytes[chunk * 64 + i * 4 + 1] << 16) |
                   (msgBytes[chunk * 64 + i * 4 + 2] << 8) |
                   msgBytes[chunk * 64 + i * 4 + 3];
            if (i < 4 || i === 15) {
                printValue(`W[${i}]`, '0x' + w[i].toString(16).padStart(8, '0'));
            }
        }
        print('  ... (remaining words 4-14 computed similarly)');
        
        // Extend to 64 words
        printSubsection('4.' + (chunk + 1) + '.2: Extend to 64 words');
        for (let i = 16; i < 64; i++) {
            const oldW = w[i - 2];
            const term1 = gamma1(oldW);
            const term2 = w[i - 7];
            const term3 = gamma0(w[i - 15]);
            const term4 = w[i - 16];
            w[i] = (term1 + term2 + term3 + term4) >>> 0;
            if (i === 16 || i === 32 || i === 48 || i === 63) {
                printValue(`W[${i}]`, '0x' + w[i].toString(16).padStart(8, '0'));
                printValue(`  γ1(W[${i-2}])`, '0x' + term1.toString(16).padStart(8, '0'));
                printValue(`  + W[${i-7}]`, '0x' + term2.toString(16).padStart(8, '0'));
                printValue(`  + γ0(W[${i-15}])`, '0x' + term3.toString(16).padStart(8, '0'));
                printValue(`  + W[${i-16}]`, '0x' + term4.toString(16).padStart(8, '0'));
            }
        }
        
        // Initialize working variables
        printSubsection('4.' + (chunk + 1) + '.3: Initialize Working Variables');
        let a = h[0], b = h[1], c = h[2], d = h[3];
        let e = h[4], f = h[5], g = h[6], hh = h[7];
        
        printValue('a = H[0]', '0x' + a.toString(16).padStart(8, '0'));
        printValue('b = H[1]', '0x' + b.toString(16).padStart(8, '0'));
        printValue('c = H[2]', '0x' + c.toString(16).padStart(8, '0'));
        printValue('d = H[3]', '0x' + d.toString(16).padStart(8, '0'));
        printValue('e = H[4]', '0x' + e.toString(16).padStart(8, '0'));
        printValue('f = H[5]', '0x' + f.toString(16).padStart(8, '0'));
        printValue('g = H[6]', '0x' + g.toString(16).padStart(8, '0'));
        printValue('h = H[7]', '0x' + hh.toString(16).padStart(8, '0'));
        
        // 64 rounds
        printSubsection('4.' + (chunk + 1) + '.4: 64 Rounds of Compression');
        for (let i = 0; i < 64; i++) {
            const t1_val = hh;
            const sigma1_e = sigma1(e);
            const ch_efg = ch(e, f, g);
            const k_i = SHA256_K[i];
            const w_i = w[i];
            
            const t1 = (hh + sigma1_e + ch_efg + k_i + w_i) >>> 0;
            const t2 = (sigma0(a) + maj(a, b, c)) >>> 0;
            
            if (i === 0 || i === 31 || i === 63) {
                print(`\n  Round ${i}:`);
                printValue('    T1 = h + Σ1(e) + Ch(e,f,g) + K[i] + W[i]', 
                    `0x${hh.toString(16).padStart(8,'0')} + 0x${sigma1_e.toString(16).padStart(8,'0')} + 0x${ch_efg.toString(16).padStart(8,'0')} + 0x${k_i.toString(16).padStart(8,'0')} + 0x${w_i.toString(16).padStart(8,'0')}`);
                printValue('    T1 =', '0x' + t1.toString(16).padStart(8, '0'));
                printValue('    T2 = Σ0(a) + Maj(a,b,c)', 
                    `0x${sigma0(a).toString(16).padStart(8,'0')} + 0x${maj(a,b,c).toString(16).padStart(8,'0')}`);
                printValue('    T2 =', '0x' + t2.toString(16).padStart(8, '0'));
            }
            
            hh = g;
            g = f;
            f = e;
            e = (d + t1) >>> 0;
            d = c;
            c = b;
            b = a;
            a = (t1 + t2) >>> 0;
            
            if (i === 0 || i === 31 || i === 63) {
                printValue('    New a', '0x' + a.toString(16).padStart(8, '0'));
                printValue('    New e', '0x' + e.toString(16).padStart(8, '0'));
            }
        }
        
        // Add compressed chunk to hash
        printSubsection('4.' + (chunk + 1) + '.5: Update Hash Values');
        h[0] = (h[0] + a) >>> 0;
        h[1] = (h[1] + b) >>> 0;
        h[2] = (h[2] + c) >>> 0;
        h[3] = (h[3] + d) >>> 0;
        h[4] = (h[4] + e) >>> 0;
        h[5] = (h[5] + f) >>> 0;
        h[6] = (h[6] + g) >>> 0;
        h[7] = (h[7] + hh) >>> 0;
        
        printValue('H[0] += a', '0x' + h[0].toString(16).padStart(8, '0'));
        printValue('H[1] += b', '0x' + h[1].toString(16).padStart(8, '0'));
        printValue('H[2] += c', '0x' + h[2].toString(16).padStart(8, '0'));
        printValue('H[3] += d', '0x' + h[3].toString(16).padStart(8, '0'));
        printValue('H[4] += e', '0x' + h[4].toString(16).padStart(8, '0'));
        printValue('H[5] += f', '0x' + h[5].toString(16).padStart(8, '0'));
        printValue('H[6] += g', '0x' + h[6].toString(16).padStart(8, '0'));
        printValue('H[7] += h', '0x' + h[7].toString(16).padStart(8, '0'));
    }
    
    // Final hash
    printSubsection('Final Hash Value');
    const hashHex = h.map(x => x.toString(16).padStart(8, '0')).join('');
    printValue('SHA-256 Hash', hashHex);
    
    return hashHex;
}

/* ============================================================
   HMAC IMPLEMENTATION WITH ALL STEPS
   ============================================================ */

function hexToBytes(hex) {
    const bytes = [];
    for (let i = 0; i < hex.length; i += 2) {
        bytes.push(parseInt(hex.substr(i, 2), 16));
    }
    return bytes;
}

function hmacWithSteps(key, message) {
    printSection('HMAC-SHA256 CALCULATION');
    printValue('Key', key);
    printValue('Message', message);
    
    const blockSize = 64;
    
    printSubsection('Step 1: Key Processing');
    printValue('Block Size', blockSize + ' bytes');
    
    // Hash key if longer than block size
    let keyBytes;
    if (key.length > blockSize) {
        print('Key is longer than block size, hashing it...');
        const hashedKey = sha256WithSteps(key);
        keyBytes = hexToBytes(hashedKey);
        printValue('Hashed Key', hashedKey);
    } else {
        keyBytes = stringToBytes(key);
    }
    printValue('Key Bytes', bytesToHex(keyBytes));
    printValue('Key Length', keyBytes.length + ' bytes');
    
    printSubsection('Step 2: Pad Key to Block Size');
    const keyPadded = new Array(blockSize);
    for (let i = 0; i < blockSize; i++) {
        keyPadded[i] = keyBytes[i] || 0;
    }
    printValue('Padded Key', bytesToHex(keyPadded));
    
    printSubsection('Step 3: Create Inner and Outer Keys');
    const innerKey = [];
    const outerKey = [];
    for (let i = 0; i < blockSize; i++) {
        innerKey[i] = keyPadded[i] ^ 0x36;
        outerKey[i] = keyPadded[i] ^ 0x5C;
    }
    printValue('Inner Key (ipad)', bytesToHex(innerKey));
    printValue('Outer Key (opad)', bytesToHex(outerKey));
    
    printSubsection('Step 4: Inner Hash - SHA256(innerKey || message)');
    const innerData = [...innerKey, ...stringToBytes(message)];
    let innerStr = '';
    for (let i = 0; i < innerData.length; i++) {
        innerStr += String.fromCharCode(innerData[i]);
    }
    printValue('Inner Data (hex)', bytesToHex(innerData));
    print('Computing SHA-256 of inner data...');
    const innerHash = sha256WithSteps(innerStr);
    printValue('Inner Hash', innerHash);
    
    printSubsection('Step 5: Outer Hash - SHA256(outerKey || innerHash)');
    const innerHashBytes = hexToBytes(innerHash);
    const outerData = [...outerKey, ...innerHashBytes];
    let outerStr = '';
    for (let i = 0; i < outerData.length; i++) {
        outerStr += String.fromCharCode(outerData[i]);
    }
    printValue('Outer Data (hex)', bytesToHex(outerData));
    print('Computing SHA-256 of outer data...');
    const finalHash = sha256WithSteps(outerStr);
    
    printSubsection('Final HMAC Result');
    printValue('HMAC-SHA256', finalHash);
    
    return finalHash;
}

function xtime(x) {
    return ((x << 1) ^ (((x >> 7) & 1) * 0x1B)) & 0xFF;
}

function gfMul2(a, b) {
    let result = 0;
    let aa = a;
    let bb = b;
    for (let i = 0; i < 8; i++) {
        if ((bb & 1) !== 0) {
            result ^= aa;
        }
        const hiBitSet = (aa & 0x80) !== 0;
        aa = (aa << 1) & 0xFF;
        if (hiBitSet) {
            aa ^= 0x1B;
        }
        bb = (bb >> 1) & 0xFF;
    }
    return result;
}

function keyExpansion(key) {
    const w = new Array(44);
    
    printSubsection('AES Key Schedule');
    printValue('Input Key', bytesToHex(key));
    
    for (let i = 0; i < 4; i++) {
        w[i] = (key[i * 4] << 24) | (key[i * 4 + 1] << 16) | (key[i * 4 + 2] << 8) | key[i * 4 + 3];
    }
    printValue('W[0-3]', `0x${w[0].toString(16).padStart(8,'0')} 0x${w[1].toString(16).padStart(8,'0')} 0x${w[2].toString(16).padStart(8,'0')} 0x${w[3].toString(16).padStart(8,'0')}`);
    
    const rcon = [0x01, 0x02, 0x04, 0x08, 0x10, 0x20, 0x40, 0x80, 0x1b, 0x36];
    
    for (let i = 4; i < 44; i++) {
        let temp = w[i - 1];
        
        if (i % 4 === 0) {
            print(`\nRound ${i/4} key generation:`);
            // RotWord
            temp = ((temp << 8) | ((temp >> 24) & 0xFF)) >>> 0;
            printValue('  After RotWord', '0x' + temp.toString(16).padStart(8, '0'));
            
            // SubWord
            const b0 = (temp >> 24) & 0xFF;
            const b1 = (temp >> 16) & 0xFF;
            const b2 = (temp >> 8) & 0xFF;
            const b3 = temp & 0xFF;
            temp = (SBOX[b0] << 24) | (SBOX[b1] << 16) | (SBOX[b2] << 8) | SBOX[b3];
            printValue('  After SubWord', '0x' + temp.toString(16).padStart(8, '0'));
            
            // XOR with Rcon
            const round = (i / 4) - 1;
            temp ^= (rcon[round] << 24);
            printValue('  After XOR Rcon', '0x' + temp.toString(16).padStart(8, '0'));
        }
        
        w[i] = (w[i - 4] ^ temp) >>> 0;
        if (i % 4 === 0) {
            printValue(`  W[${i}]`, '0x' + w[i].toString(16).padStart(8, '0'));
        }
    }
    
    return w;
}

function subBytes(state) {
    for (let i = 0; i < 16; i++) {
        const row = Math.floor(i / 4);
        const col = i % 4;
        const val = state[row * 4 + col];
        state[row * 4 + col] = SBOX[val];
    }
    return state;
}

function shiftRows(state) {
    const temp = [...state];
    state[1] = temp[5];
    state[5] = temp[9];
    state[9] = temp[13];
    state[13] = temp[1];
    state[2] = temp[10];
    state[6] = temp[14];
    state[10] = temp[2];
    state[14] = temp[6];
    state[3] = temp[15];
    state[7] = temp[3];
    state[11] = temp[7];
    state[15] = temp[11];
    return state;
}

function mixColumns(state) {
    for (let col = 0; col < 4; col++) {
        const idx = col * 4;
        const s0 = state[idx];
        const s1 = state[idx + 1];
        const s2 = state[idx + 2];
        const s3 = state[idx + 3];
        
        state[idx] = gfMul2(s0, 0x02) ^ gfMul2(s1, 0x03) ^ s2 ^ s3;
        state[idx + 1] = s0 ^ gfMul2(s1, 0x02) ^ gfMul2(s2, 0x03) ^ s3;
        state[idx + 2] = s0 ^ s1 ^ gfMul2(s2, 0x02) ^ gfMul2(s3, 0x03);
        state[idx + 3] = gfMul2(s0, 0x03) ^ s1 ^ s2 ^ gfMul2(s3, 0x02);
    }
    return state;
}

function addRoundKey(state, roundKey) {
    for (let i = 0; i < 16; i++) {
        state[i] ^= roundKey[i];
    }
    return state;
}

function aesEncryptWithSteps(plaintext, key, label = 'AES') {
    printSection(label + ' ENCRYPTION');
    printValue('Input Block', bytesToHex(plaintext));
    printValue('Key', bytesToHex(key));
    
    const w = keyExpansion(key);
    
    let state = [...plaintext];
    printSubsection('Initial Round');
    printValue('State before AddRoundKey', bytesToHex(state));
    
    const initialKeyBytes = [];
    for (let i = 0; i < 4; i++) {
        initialKeyBytes.push((w[i] >> 24) & 0xFF);
        initialKeyBytes.push((w[i] >> 16) & 0xFF);
        initialKeyBytes.push((w[i] >> 8) & 0xFF);
        initialKeyBytes.push(w[i] & 0xFF);
    }
    printValue('Round Key 0', bytesToHex(initialKeyBytes));
    state = addRoundKey(state, initialKeyBytes);
    printValue('State after AddRoundKey', bytesToHex(state));
    
    // 9 main rounds
    for (let round = 1; round < 10; round++) {
        printSubsection(`Round ${round}`);
        
        const roundKeyWords = w.slice(round * 4, (round + 1) * 4);
        const roundKeyBytes = [];
        for (let i = 0; i < 4; i++) {
            roundKeyBytes.push((roundKeyWords[i] >> 24) & 0xFF);
            roundKeyBytes.push((roundKeyWords[i] >> 16) & 0xFF);
            roundKeyBytes.push((roundKeyWords[i] >> 8) & 0xFF);
            roundKeyBytes.push(roundKeyWords[i] & 0xFF);
        }
        
        printValue('Input State', bytesToHex(state));
        
        state = subBytes(state);
        printValue('After SubBytes', bytesToHex(state));
        
        state = shiftRows(state);
        printValue('After ShiftRows', bytesToHex(state));
        
        state = mixColumns(state);
        printValue('After MixColumns', bytesToHex(state));
        
        state = addRoundKey(state, roundKeyBytes);
        printValue('After AddRoundKey', bytesToHex(state));
    }
    
    // Final round
    printSubsection('Final Round (10)');
    const finalKeyWords = w.slice(40, 44);
    const finalKeyBytes = [];
    for (let i = 0; i < 4; i++) {
        finalKeyBytes.push((finalKeyWords[i] >> 24) & 0xFF);
        finalKeyBytes.push((finalKeyWords[i] >> 16) & 0xFF);
        finalKeyBytes.push((finalKeyWords[i] >> 8) & 0xFF);
        finalKeyBytes.push(finalKeyWords[i] & 0xFF);
    }
    
    printValue('Input State', bytesToHex(state));
    state = subBytes(state);
    printValue('After SubBytes', bytesToHex(state));
    state = shiftRows(state);
    printValue('After ShiftRows', bytesToHex(state));
    state = addRoundKey(state, finalKeyBytes);
    printValue('After AddRoundKey (Final)', bytesToHex(state));
    
    printValue('Ciphertext', bytesToHex(state));
    return state;
}

/* ============================================================
   CMAC IMPLEMENTATION WITH ALL STEPS
   ============================================================ */

function leftShift1Bit(bytes) {
    const result = new Array(bytes.length);
    let carry = 0;
    for (let i = bytes.length - 1; i >= 0; i--) {
        result[i] = ((bytes[i] << 1) | carry) & 0xFF;
        carry = (bytes[i] >> 7) & 1;
    }
    return result;
}

function cmacWithSteps(message, keyHex) {
    printSection('CMAC-AES CALCULATION');
    printValue('Key (hex)', keyHex);
    printValue('Message', message);
    
    // Convert key
    const key = hexToBytes(keyHex);
    printValue('Key (bytes)', bytesToHex(key));
    printValue('Key Length', key.length + ' bytes (128-bit)');
    
    printSubsection('Step 1: Generate Subkeys K1 and K2');
    print('Computing L = AES(0^128)...');
    
    const zeroBlock = new Array(16).fill(0);
    printValue('Zero Block', bytesToHex(zeroBlock));
    
    const L = aesEncryptWithSteps(zeroBlock, key, 'Generate L');
    
    printSubsection('Subkey K1 Generation');
    printValue('L', bytesToHex(L));
    const K1 = leftShift1Bit(L);
    printValue('LeftShift(L)', bytesToHex(K1));
    printValue('MSB(L)', '0x' + ((L[0] >> 7) & 1));
    
    if ((L[0] & 0x80) !== 0) {
        K1[15] ^= 0x87;
        print('MSB(L)=1, so K1 = K1 XOR 0x87');
    }
    printValue('K1 (final)', bytesToHex(K1));
    
    printSubsection('Subkey K2 Generation');
    const K2 = leftShift1Bit(K1);
    printValue('LeftShift(K1)', bytesToHex(K2));
    printValue('MSB(K1)', '0x' + ((K1[0] >> 7) & 1));
    
    if ((K1[0] & 0x80) !== 0) {
        K2[15] ^= 0x87;
        print('MSB(K1)=1, so K2 = K2 XOR 0x87');
    }
    printValue('K2 (final)', bytesToHex(K2));
    
    printSubsection('Step 2: Message Processing');
    const msgBytes = stringToBytes(message);
    printValue('Message Bytes', bytesToHex(msgBytes));
    printValue('Message Length', msgBytes.length + ' bytes');
    
    const blocks = [];
    for (let i = 0; i < msgBytes.length; i += 16) {
        blocks.push(msgBytes.slice(i, i + 16));
    }
    printValue('Number of Blocks', blocks.length);
    
    for (let i = 0; i < blocks.length; i++) {
        printValue(`Block ${i+1}`, bytesToHex(blocks[i].concat(new Array(16 - blocks[i].length).fill(0))));
    }
    
    printSubsection('Step 3: Last Block Processing');
    let lastBlock = blocks[blocks.length - 1];
    let M_last;
    
    if (lastBlock.length === 16) {
        print('Last block is exactly 16 bytes - using K1');
        M_last = new Array(16);
        for (let i = 0; i < 16; i++) {
            M_last[i] = lastBlock[i] ^ K1[i];
        }
        blocks.pop();
    } else {
        print('Last block is less than 16 bytes - padding with 0x80 and zeros, using K2');
        M_last = new Array(16).fill(0);
        for (let i = 0; i < lastBlock.length; i++) {
            M_last[i] = lastBlock[i];
        }
        M_last[lastBlock.length] = 0x80;
        printValue('Padded Last Block', bytesToHex(M_last));
        
        for (let i = 0; i < 16; i++) {
            M_last[i] ^= K2[i];
        }
        printValue('After XOR with K2', bytesToHex(M_last));
        blocks.pop();
    }
    printValue('M_last (final)', bytesToHex(M_last));
    
    printSubsection('Step 4: Accumulate XOR of All Blocks');
    let X = new Array(16).fill(0);
    printValue('Initial X', bytesToHex(X));
    
    for (let bi = 0; bi < blocks.length; bi++) {
        const block = blocks[bi];
        const paddedBlock = new Array(16).fill(0);
        for (let i = 0; i < block.length; i++) {
            paddedBlock[i] = block[i];
        }
        print(`XOR with Block ${bi + 1}: ${bytesToHex(X)} XOR ${bytesToHex(paddedBlock)}`);
        for (let i = 0; i < 16; i++) {
            X[i] ^= paddedBlock[i];
        }
        printValue(`X after Block ${bi + 1}`, bytesToHex(X));
    }
    
    print('XOR with M_last...');
    print(`${bytesToHex(X)} XOR ${bytesToHex(M_last)}`);
    for (let i = 0; i < 16; i++) {
        X[i] ^= M_last[i];
    }
    printValue('X (final before encryption)', bytesToHex(X));
    
    printSubsection('Step 5: Final AES Encryption');
    const result = aesEncryptWithSteps(X, key, 'CMAC Final');
    
    printSubsection('CMAC Result');
    printValue('CMAC-AES', bytesToHex(result));
    
    return result;
}

   UI FUNCTIONS
   ============================================================ */

function runHMAC() {
    const key = document.getElementById('hmacKey').value;
    const msg = document.getElementById('hmacMsg').value;
    hmacWithSteps(key, msg);
    showOutput('hmacOutput');
}

function runCMAC() {
    const keyHex = document.getElementById('cmacKey').value;
    const msg = document.getElementById('cmacMsg').value;
    cmacWithSteps(msg, keyHex);
    showOutput('cmacOutput');
}
